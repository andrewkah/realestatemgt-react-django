stages:
  - backend-install
  - backend-test
  - frontend-build

variables:
  # Backend
  ENVIRONMENT: pipeline
  PYTHONUNBUFFERED: 1

backend-install:
  stage: backend-install
  image: python:3.12
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements.txt
  script:
    - cd backend
    - python manage.py migrate
    - python manage.py collectstatic --noinput

backend-test:
  stage: backend-test
  image: python:3.12
  dependencies:
    - backend-install
  script:
    - cd backend
    - python manage.py makemigrations --check --dry-run
    - python manage.py test

frontend-build:
  stage: frontend-build
  image: node:20
  before_script:
    - cd frontend
    - npm ci
  script:
    - npm run build

