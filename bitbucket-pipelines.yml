image: python:3.12

pipelines:
  default:
    - step:
        name: Backend Tests
        services:
          - postgres
        caches:
          - pip
        script:
          - cd backend
          - pip install --upgrade pip
          - pip install -r requirements.txt
          - python manage.py makemigrations --check --dry-run
          - python manage.py migrate
          - python manage.py test
    - step:
        name: Frontend Build
        image: node:20
        caches:
          - node
        script:
          - cd frontend
          - npm ci
          - npm run build

definitions:
  services:
    mysql:
      image: mysql:8.0
      environment:
        MYSQL_DATABASE: real_estate_dev_db
        MYSQL_USER: real_estate_user
        MYSQL_PASSWORD: StrongPasswordHere
        MYSQL_ROOT_PASSWORD: rootpassword