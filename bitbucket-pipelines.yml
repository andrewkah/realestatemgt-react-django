image: python:3.12

pipelines:
  default:
    - step:
        name: Backend Tests
        services:
          - postgres
        caches:
          - pip
        script:
          - export ENVIRONMENT=pipeline
          - cd backend          
          - pip install --upgrade pip
          - pip install -r requirements.txt
          - python manage.py makemigrations --check --dry-run
          - python manage.py migrate
          - python manage.py test
    - step:
        name: Frontend Build
        image: node:20
        caches:
          - node
        script:
          - cd frontend
          - npm ci
          - npm run build

definitions:
  services:
    postgres:
      image: postgres:15
      environment:
        POSTGRES_DB: test_db
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres