image: python:3.12

pipelines:
  default:
    - step:
        name: Backend Tests
        services:
          - postgres
        caches:
          - pip
        script:
          - cd backend
          - export DJANGO_SETTINGS_MODULE=realestatemgt.settings
          - export ENVIRONMENT=pipeline
          - apt-get update && apt-get install -y postgresql-client
          - until PGPASSWORD=postgres psql -h postgres -U postgres -d test_db -c "SELECT 1;" > /dev/null 2>&1; do echo "Waiting for postgres..."; sleep 2; done
          - pip install --upgrade pip
          - pip install -r requirements.txt
          - python manage.py migrate
          - python manage.py test
    - step:
        name: Frontend Build
        image: node:20
        caches:
          - node
        script:
          - cd frontend
          - npm ci
          - npm run build

definitions:
  services:
    postgres:
      image: postgres:15
      environment:
        POSTGRES_DB: test_db
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_HOST_AUTH_METHOD: trust