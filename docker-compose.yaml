version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: real_estate_backend
    command: python manage.py runserver 0.0.0.0:8085
    volumes:
      - ./backend:/backend
    ports:
      - "8000:8085"
    env_file:
      - ./backend/.env
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: real_estate_frontend
    volumes:
      - ./frontend:/frontend
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true

  db:
    image: postgres:15
    container_name: real_estate_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=real_estate_dev
      - POSTGRES_USER=real_estate_user
      - POSTGRES_PASSWORD=realestatepass
    ports:
      - "5432:5432"

volumes:
  postgres_data: